<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyScraper Multi-Liens</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-4 flex items-center gap-2">
            🚀 PolyScraper
        </h1>
        
        <label class="block text-sm text-slate-400 mb-2">Collez vos liens (un par ligne) :</label>
        <textarea id="linksInput" rows="6" 
            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-blue-400 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            placeholder="https://amazon.com/...&#10;https://ebay.com/..."></textarea>

        <button onclick="startExtraction()" id="btnText"
            class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95">
            LANCER L'EXTRACTION GROUPÉE ⚡
        </button>

        <div id="loading" class="hidden mt-4 text-center text-sm text-blue-400 animate-pulse">
            Extraction en cours... veuillez patienter...
        </div>

        <div id="results" class="mt-6 space-y-2"></div>
    </div>

    <script>
        async function startExtraction() {
            const input = document.getElementById('linksInput').value;
            const links = input.split('\n').filter(l => l.trim() !== "");
            const btn = document.getElementById('btnText');
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');

            if (links.length === 0) return alert("Veuillez ajouter des liens.");

            // Interface
            btn.disabled = true;
            btn.style.opacity = "0.5";
            loading.classList.remove('hidden');
            resultsDiv.innerHTML = "";

            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ links: links })
                });

                const data = await response.json();
                
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.style.opacity = "1";

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "p-3 bg-slate-700 rounded-lg text-xs border-l-4 " + 
                                     (item.status === "Succès" ? "border-green-500" : "border-red-500");
                    card.innerHTML = `<strong>${item.status}</strong>: ${item.data || item.url}`;
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                alert("Erreur de connexion au serveur.");
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
