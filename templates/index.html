<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyScraper Multi Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; }
        textarea { width: 100%; height: 150px; border-radius: 10px; background: #0f172a; color: #00f2fe; padding: 10px; border: 1px solid #334155; margin: 15px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, #4facfe, #00f2fe); font-weight: bold; cursor: pointer; }
        .res-item { border-bottom: 1px solid #334155; padding: 10px 0; }
        .badge { background: #4facfe; color: #0f172a; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 PolyScraper Multi-Liens</h2>
    <p style="font-size: 13px; color: #94a3b8;">Collez un lien par ligne (Amazon, eBay, Walmart...)</p>
    
    <form action="/analyser" method="post">
        <textarea name="urls_cibles" placeholder="Lien 1...&#10;Lien 2...&#10;Lien 3..."></textarea>
        <button type="submit">LANCER L'EXTRACTION GROUPÉE ⚡</button>
    </form>

    {% if resultats %}
        <div style="margin-top: 20px;">
            <form action="/download-excel" method="post">
                <input type="hidden" name="raw_json" value='{{ raw_json | safe }}'>
                <button type="submit" style="background: #22c55e; color: white;">📥 TÉLÉCHARGER LE FICHIER EXCEL UNIQUE</button>
            </form>

            <h3 style="margin-top: 25px;">Aperçu des {{ resultats|length }} produits :</h3>
            {% for res in resultats %}
                <div class="res-item">
                    <span class="badge">{{ res.Prix }}</span> <strong>{{ res.Produit }}</strong>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
