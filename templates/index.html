<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyScraper AI v2.1 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#1e293b] rounded-3xl shadow-2xl p-6 border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                🕵️‍♂️ <span class="text-blue-400">PolyScraper AI</span> <span class="text-xs bg-blue-900 px-2 py-1 rounded text-blue-200">v2.1 Pro</span>
            </h1>
            <p class="text-slate-400 text-sm mt-2">Extraction multi-liens haute performance</p>
        </div>

        <form action="/extract" method="post" class="space-y-4">
            <textarea name="links" rows="5" 
                class="w-full bg-[#0f172a] border border-slate-600 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" 
                placeholder="Collez vos liens ici (un par ligne)..."></textarea>
            
            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                LANCER L'EXTRACTION GROUPÉE ⚡
            </button>
        </form>

        {% if results %}
        <div class="mt-8 space-y-4">
            <h2 class="text-sm font-semibold text-blue-300 uppercase tracking-widest border-b border-slate-700 pb-2">Rapport d'extraction</h2>
            
            <div class="max-h-60 overflow-y-auto space-y-2 pr-2">
                {% for item in results %}
                <div class="bg-[#2d3a4f] p-3 rounded-lg border-l-4 {% if item.status == '🟢' %}border-green-500{% else %}border-red-500{% endif %}">
                    <p class="text-xs font-bold text-slate-300 truncate">{{ item.nom }}</p>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-blue-400 font-mono text-sm">{{ item.prix }}</span>
                        <span class="text-[10px] text-slate-500 italic">Amazon/eBay</span>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="flex gap-2 pt-4">
                <button class="flex-1 bg-green-900/30 border border-green-500 text-green-400 py-2 rounded-lg text-sm flex items-center justify-center gap-2 hover:bg-green-500 hover:text-white transition-all">
                    📊 EXCEL
                </button>
                <button class="flex-1 bg-slate-700 text-slate-300 py-2 rounded-lg text-sm flex items-center justify-center gap-2 hover:bg-slate-600 transition-all">
                    📁 CSV
                </button>
            </div>
        </div>
        {% endif %}
    </div>

</body>
</html>
