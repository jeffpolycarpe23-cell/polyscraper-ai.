<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyScraper AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">🕵️‍♂️ PolyScraper AI</h1>
            <p class="text-slate-400">Analyse de données intelligente</p>
        </div>

        <form id="scrapingForm" action="/analyser" method="POST" class="space-y-4">
            <input type="url" name="url_cible" placeholder="Collez l'URL ici..." class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none transition" required>
            
            <button id="btnSubmit" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition active:scale-95">
                LANCER L'EXTRACTION ✨
            </button>
        </form>

        <div id="loader" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-2"></div>
            <p class="text-blue-400 animate-pulse">Recherche en cours, veuillez patienter... 🕵️‍♂️</p>
        </div>

        {% if resultat %}
        <div class="mt-8 p-6 bg-slate-900 rounded-2xl border border-blue-500/30">
            <h2 class="text-blue-400 font-bold mb-4">Résultat :</h2>
            <div class="text-slate-300 text-sm mb-6">{{ resultat | replace('\n', '<br>') | safe }}</div>

            <div class="grid grid-cols-2 gap-4">
                <form action="/download-excel" method="POST">
                    <input type="hidden" name="resultat_ia" value="{{ resultat }}">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl text-xs font-bold transition">📥 EXCEL</button>
                </form>
                <form action="/download-csv" method="POST">
                    <input type="hidden" name="resultat_ia" value="{{ resultat }}">
                    <button type="submit" class="w-full bg-slate-600 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold transition">📂 CSV</button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        // Ce script affiche le message de chargement quand on clique
        document.getElementById('scrapingForm').onsubmit = function() {
            document.getElementById('btnSubmit').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
        };
    </script>
</body>
</html>
