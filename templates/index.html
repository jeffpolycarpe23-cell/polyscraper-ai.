<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyScraper AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">🕵️‍♂️ PolyScraper AI</h1>
            <p class="text-slate-400">Cher Client, entrez l'URL à analyser</p>
        </div>

        <form action="/analyser" method="POST" class="space-y-4">
            <input type="url" 
                   name="url_cible" 
                   placeholder="https://exemple.com/produit" 
                   class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none transition"
                   required>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95">
                LANCER L'EXTRACTION ✨
            </button>
        </form>

        {% if resultat %}
        <div class="mt-8 p-6 bg-slate-900 rounded-2xl border border-blue-500/30">
            <h2 class="text-blue-400 font-bold mb-4">Résultat de l'analyse :</h2>
            <div class="text-slate-300 text-sm leading-relaxed mb-6">
                {{ resultat | replace('\n', '<br>') | safe }}
            </div>

            <div class="grid grid-cols-1 gap-3">
                <form action="/download-excel" method="POST">
                    <input type="hidden" name="resultat_ia" value="{{ resultat }}">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 py-2 rounded-lg text-sm font-semibold transition">
                        📥 Télécharger en EXCEL
                    </button>
                </form>
            </div>
        </div>
        {% endif %}

        {% if erreur %}
        <div class="mt-4 p-4 bg-red-900/30 border border-red-500/50 text-red-400 rounded-xl text-center text-sm">
            {{ erreur }}
        </div>
        {% endif %}
    </div>

</body>
</html>
