<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyScraper AI v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1120] text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#171f2f] rounded-3xl shadow-2xl p-6 border border-slate-800">
        <div class="text-center mb-8">
            <div class="inline-block bg-blue-900/30 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/30 mb-3">VERSION 2.1 PRO</div>
            <h1 class="text-3xl font-extrabold tracking-tight">🕵️‍♂️ PolyScraper <span class="text-blue-500">AI</span></h1>
            <p class="text-slate-400 text-xs mt-2 font-medium">L'extraction de données nouvelle génération.</p>
        </div>

        <form action="/extract" method="post" class="space-y-4">
            <div class="relative">
                <textarea name="links" rows="4" required
                    class="w-full bg-[#0f172a] border-2 border-slate-700 rounded-2xl p-4 text-sm text-blue-100 placeholder-slate-500 focus:border-blue-500 focus:ring-0 outline-none transition-all"
                    placeholder="Collez vos liens ici (un par ligne)..."></textarea>
            </div>
            
            <button type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 uppercase tracking-tighter">
                EXTRAIRE LES DONNÉES ⚡
            </button>
        </form>

        {% if results %}
        <div class="mt-8 animate-fade-in">
            <div class="flex items-center justify-between border-b border-slate-800 pb-2 mb-4">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Rapport d'extraction</span>
                <span class="h-2 w-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
            </div>
            
            <div class="space-y-3 max-h-64 overflow-y-auto pr-2">
                {% for item in results %}
                <div class="bg-[#1e293b] p-4 rounded-2xl border border-slate-700/50">
                    <h3 class="text-blue-400 font-bold text-sm truncate">{{ item.nom }}</h3>
                    <div class="flex justify-between mt-2">
                        <span class="text-xs text-slate-400">🏷️ Prix : <span class="text-white font-bold">{{ item.prix }}</span></span>
                        <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-500">Amazon</span>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="grid grid-cols-2 gap-3 mt-6">
                <button class="bg-green-900/20 border border-green-500/50 text-green-400 py-3 rounded-xl text-xs font-bold hover:bg-green-500 hover:text-white transition-all">📊 EXCEL</button>
                <button class="bg-slate-800 border border-slate-700 text-slate-400 py-3 rounded-xl text-xs font-bold hover:bg-slate-700 transition-all">📁 CSV</button>
            </div>
        </div>
        {% endif %}
    </div>

</body>
</html>
